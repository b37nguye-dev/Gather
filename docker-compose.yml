services:
  postgres:
    image: postgres:16-alpine
    container_name: gather-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gather
      POSTGRES_PASSWORD: gather_dev
      POSTGRES_DB: gather
    ports:
      - "5432:5432"
    volumes:
      - gather_postgres_data:/var/lib/postgresql/data

volumes:
  gather_postgres_data:
